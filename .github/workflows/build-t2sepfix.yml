name: Build T2SEPFix.kext

on:
  push:
    paths:
      - 'T2SEPFix/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build T2SEPFix.kext
        run: |
          cd T2SEPFix
          make

      - name: Ad-hoc sign
        run: |
          codesign -s - --force T2SEPFix/T2SEPFix.kext

      - name: Verify with kextutil
        run: |
          kextutil -n T2SEPFix/T2SEPFix.kext || true

      - name: Copy to payloads
        run: |
          mkdir -p payloads/Kexts/T2SEPFix.kext/Contents/MacOS
          cp -r T2SEPFix/T2SEPFix.kext/Contents/Info.plist \
                payloads/Kexts/T2SEPFix.kext/Contents/
          cp T2SEPFix/T2SEPFix.kext/Contents/MacOS/T2SEPFix \
             payloads/Kexts/T2SEPFix.kext/Contents/MacOS/

      - name: Commit compiled kext
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add payloads/Kexts/T2SEPFix.kext
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "ci: add compiled T2SEPFix.kext binary [skip ci]"
          git push
